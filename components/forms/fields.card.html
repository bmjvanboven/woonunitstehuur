<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin:0; font-family: var(--font-body); background: var(--surface-card); color: var(--text-strong); padding:26px; }
  .grid { display:grid; grid-template-columns:1fr 1fr; gap:20px 24px; align-items:start; }
  .span { grid-column:1 / -1; }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel">
  const { Input, Select, Textarea } = window.WoonunitstehuurDesignSystem_c98620;
  function Demo() {
    return (
      <div className="grid">
        <Input label="Naam" placeholder="Voor- en achternaam" defaultValue="Familie de Vries" />
        <Input label="Postcode" error="Vul een geldige postcode in." defaultValue="12 AB" />
        <Select label="Type woonunit" placeholder="Maak een keuze" options={['1–2 personen','Gezinsunit','XL familie-unit']} />
        <Input label="Gewenste startdatum" type="date" />
        <div className="span"><Textarea label="Uw situatie" rows={3} placeholder="Vertel ons over uw verbouwing en gewenste periode…" helper="Wij reageren binnen één werkdag." /></div>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
</script>
</body>
</html>
