<!-- @dsCard group="Colors" viewport="700x150" name="Ink & Warm Neutrals" subtitle="Near-black wordmark ink and the warm sand neutral ramp" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; font-family: var(--font-body); background: var(--surface-card); color: var(--text-strong); }
  .row { display:flex; gap:0; padding:20px; }
  .sw { flex:1; display:flex; flex-direction:column; gap:8px; }
  .chip { height:64px; border-radius: var(--radius-sm); border:1px solid rgba(0,0,0,0.06); }
  .name { font-size:12px; font-weight:600; }
  .hex { font-size:11px; color: var(--text-muted); font-family: var(--font-mono); }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--ink-800)"></div><div class="name">ink-800 ★</div><div class="hex">#1b1b1b</div></div>
    <div class="sw"><div class="chip" style="background:var(--sand-700)"></div><div class="name">sand-700</div><div class="hex">#4c4639</div></div>
    <div class="sw"><div class="chip" style="background:var(--sand-500)"></div><div class="name">sand-500</div><div class="hex">#938b7c</div></div>
    <div class="sw"><div class="chip" style="background:var(--sand-300)"></div><div class="name">sand-300</div><div class="hex">#d8d0c1</div></div>
    <div class="sw"><div class="chip" style="background:var(--sand-100)"></div><div class="name">sand-100</div><div class="hex">#f4f0e9</div></div>
    <div class="sw"><div class="chip" style="background:var(--sand-50)"></div><div class="name">sand-50 · page</div><div class="hex">#faf8f4</div></div>
  </div>
</body>
</html>
