<!-- @dsCard group="Spacing" viewport="700x150" name="Spacing Scale" subtitle="4px base grid — 4 / 8 / 12 / 16 / 24 / 32 / 48 / 64" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; font-family: var(--font-body); background: var(--surface-card); color: var(--text-strong); padding:24px; }
  .row { display:flex; align-items:flex-end; gap:18px; }
  .item { display:flex; flex-direction:column; align-items:center; gap:8px; }
  .bar { background:var(--gold-500); border-radius:var(--radius-xs); width:18px; }
  .tok { font-family:var(--font-mono); font-size:11px; color:var(--text-muted); }
</style>
</head>
<body>
  <div class="row">
    <div class="item"><div class="bar" style="height:4px"></div><div class="tok">1·4</div></div>
    <div class="item"><div class="bar" style="height:8px"></div><div class="tok">2·8</div></div>
    <div class="item"><div class="bar" style="height:12px"></div><div class="tok">3·12</div></div>
    <div class="item"><div class="bar" style="height:16px"></div><div class="tok">4·16</div></div>
    <div class="item"><div class="bar" style="height:24px"></div><div class="tok">6·24</div></div>
    <div class="item"><div class="bar" style="height:32px"></div><div class="tok">8·32</div></div>
    <div class="item"><div class="bar" style="height:48px"></div><div class="tok">12·48</div></div>
    <div class="item"><div class="bar" style="height:64px"></div><div class="tok">16·64</div></div>
  </div>
</body>
</html>
