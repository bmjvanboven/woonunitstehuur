<!-- @dsCard group="Type" viewport="700x230" name="Display — Archivo" subtitle="Heavy architectural grotesque for headlines & the wordmark feel" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; font-family: var(--font-body); background: var(--surface-card); color: var(--text-strong); padding:24px; }
  .specimen { font-family: var(--font-display); font-weight:900; font-size:54px; line-height:1.0; letter-spacing:var(--tracking-tight); text-transform:uppercase; }
  .sub { font-family: var(--font-display); font-weight:800; font-size:30px; line-height:1.15; letter-spacing:var(--tracking-snug); margin-top:14px; }
  .meta { margin-top:16px; font-size:12px; color:var(--text-muted); display:flex; gap:18px; font-family:var(--font-mono); }
</style>
</head>
<body>
  <div class="specimen">Comfortabel<br>tijdelijk wonen</div>
  <div class="sub">Volledig ingericht &amp; direct klaar</div>
  <div class="meta"><span>Archivo</span><span>900 · 800</span><span>uppercase / -2% tracking</span></div>
</body>
</html>
