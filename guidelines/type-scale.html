<!-- @dsCard group="Type" viewport="700x300" name="Type Scale" subtitle="From 80px display down to 12px caption" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; font-family: var(--font-body); background: var(--surface-card); color: var(--text-strong); padding:22px 24px; }
  .line { display:flex; align-items:baseline; gap:16px; border-bottom:1px solid var(--border-subtle); padding:7px 0; }
  .tok { font-family:var(--font-mono); font-size:11px; color:var(--text-subtle); width:84px; flex:none; }
  .ex { font-family:var(--font-display); font-weight:800; letter-spacing:var(--tracking-snug); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
</style>
</head>
<body>
  <div class="line"><span class="tok">5xl · 62</span><span class="ex" style="font-size:48px">Woonunit</span></div>
  <div class="line"><span class="tok">3xl · 38</span><span class="ex" style="font-size:34px">Comfortabel wonen</span></div>
  <div class="line"><span class="tok">xl · 24</span><span class="ex" style="font-size:24px">Volledig ingericht en direct klaar</span></div>
  <div class="line"><span class="tok">md · 18</span><span class="ex" style="font-size:18px; font-family:var(--font-body); font-weight:500">Op eigen terrein blijven wonen</span></div>
  <div class="line"><span class="tok">sm · 14</span><span class="ex" style="font-size:14px; font-family:var(--font-body); font-weight:400; color:var(--text-muted)">Aanvraag binnen één werkdag in behandeling</span></div>
</body>
</html>
